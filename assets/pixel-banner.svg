<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Arcade terminal style profile banner</title>
  <desc id="desc">Pixel-inspired banner with terminal grid and system engineering wording.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06141b"/>
      <stop offset="55%" stop-color="#0b2a34"/>
      <stop offset="100%" stop-color="#103b45"/>
    </linearGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="0" width="8" height="1" fill="#9ad8d5" fill-opacity="0.08"/>
    </pattern>
  </defs>

  <g shape-rendering="crispEdges">
    <rect width="1280" height="360" fill="url(#bg)"/>
    <rect width="1280" height="360" fill="url(#scan)"/>

    <rect x="58" y="42" width="1164" height="276" fill="#031015" stroke="#19c6b8" stroke-width="4"/>
    <rect x="72" y="56" width="1136" height="248" fill="#081d26" stroke="#0f8f86" stroke-width="2"/>

    <rect x="84" y="68" width="20" height="20" fill="#14b8a6"/>
    <rect x="112" y="68" width="20" height="20" fill="#f59e0b"/>
    <rect x="140" y="68" width="20" height="20" fill="#22c55e"/>

    <rect x="84" y="104" width="1112" height="2" fill="#1b6f71"/>
    <rect x="84" y="286" width="1112" height="2" fill="#1b6f71"/>

    <rect x="90" y="296" width="54" height="8" fill="#0ea5a4"/>
    <rect x="150" y="296" width="54" height="8" fill="#f59e0b"/>
    <rect x="210" y="296" width="54" height="8" fill="#0ea5a4"/>

    <rect x="980" y="80" width="18" height="18" fill="#9ad8d5"/>
    <rect x="1022" y="108" width="18" height="18" fill="#9ad8d5"/>
    <rect x="1064" y="86" width="18" height="18" fill="#9ad8d5"/>
    <rect x="1106" y="114" width="18" height="18" fill="#9ad8d5"/>
    <rect x="1148" y="92" width="18" height="18" fill="#9ad8d5"/>

    <rect x="942" y="246" width="240" height="44" fill="#0b2a34" stroke="#19c6b8" stroke-width="2"/>
    <rect x="954" y="258" width="100" height="8" fill="#14b8a6"/>
    <rect x="1062" y="258" width="108" height="8" fill="#f59e0b"/>
    <rect x="954" y="272" width="216" height="8" fill="#0f8f86"/>
  </g>

  <g font-family="'Courier New', monospace">
    <text x="106" y="162" font-size="72" font-weight="700" fill="#e6fff8">MGZHNN</text>
    <text x="108" y="226" font-size="22" fill="#ffd08a">ML + EMBEDDED + LOGIC DESIGN</text>
  </g>
</svg>
